<body>
    <!-- Loading Screen -->
    <div id="loading-screen">

                <img src="static/images/guru-mula-logo.png" alt="GuruMula Logo" class="loading-logo" />

                setTimeout(() => {
                    loading.style.display = 'none';
                }, 800);
            }
        }, 4000);

    <script type="module">
        import init from './target/wasm32-unknown-unknown/release/guru_mula.js';
        
        try {
            await init();
        } catch (error) {
            console.error('Failed to start GuruMula:', error);
            // Still hide loading screen
            const loading = document.getElementById('loading-screen');
            if (loading) {
                loading.style.opacity = '0';
                loading.style.transition = 'opacity 0.8s ease';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 800);
            }
            document.getElementById('app').innerHTML = `
