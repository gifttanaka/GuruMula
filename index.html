<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuruMula - Your Financial Wisdom, Local & Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link data-trunk rel="css" href="static/styles.css" />
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import init from './target/wasm32-unknown-unknown/release/guru_mula.js';
        try {
            await init();
        } catch (error) {
            console.error('Failed to start GuruMula:', error);
            document.getElementById('app').innerHTML = `
                <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #c53030;">
                    <h1 style="font-size: 2rem;">⚠️ Failed to load GuruMula</h1>
                    <p style="color: #718096;">Error: ${error.message || 'Unknown error'}</p>
                    <p style="color: #718096; font-size: 0.9rem; margin-top: 1rem;">Check console for details</p>
                </div>
            `;
        }
    </script>
</body>
</html>
